<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proverbs Large Image Assets</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f4ee;
        color: #222;
      }

      main {
        width: min(620px, calc(100vw - 40px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 8px 0;
        line-height: 1.6;
      }

      code {
        padding: 2px 6px;
        border-radius: 4px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Proverbs Large Image Assets</h1>
      <p>Static image assets larger than 300KB for the mini program.</p>
      <p>Example path: <code>/images/home/hero-campus-jelly-v5.png</code></p>
    </main>
  </body>
</html>
