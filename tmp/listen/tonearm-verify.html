<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root { --u: 0.5px; }
  body { margin:0; background:linear-gradient(180deg,#dbeafe,#eff6ff); display:flex; justify-content:center; padding-top:80px; }
  .player-card {
    position: relative;
    width: calc(620 * var(--u));
    height: calc(620 * var(--u));
    border-radius: calc(56 * var(--u));
    background: #fff;
    box-shadow: 0 18px 48px rgba(0,0,0,.13);
    display:flex; align-items:center; justify-content:center;
    overflow: visible;
  }
  .turntable { position:relative; width:calc(520*var(--u)); height:calc(520*var(--u)); }
  .disc-stack {
    position:relative; width:100%; height:100%; border-radius:50%; overflow:hidden;
    background: radial-gradient(circle, #9b87c4 0 26%, #d8dce3 26% 100%);
  }
  .tonearm-pivot {
    position:absolute;
    top: calc(-10 * var(--u));
    right: calc(-200 * var(--u));
    width: calc(640 * var(--u));
    z-index:5;
    transform-origin: 63.0% 14.6%;
    transform: rotate(-90deg);
    filter: drop-shadow(0 4px 10px rgba(0,0,0,.12));
  }
  .tonearm-pivot.on { transform: rotate(40deg); }
  .tonearm-img { display:block; width:100%; }
</style>
</head>
<body>
  <div class="player-card">
    <div class="turntable"><div class="disc-stack"></div></div>
    <div class="tonearm-pivot on" id="arm">
      <img class="tonearm-img" src="../../images/listen/tonearm-playing.png">
    </div>
  </div>
</body>
</html>
