<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>share poster preview</title>
<style>
  body { background: #f5f0ff; display: flex; gap: 24px; padding: 24px; margin: 0; }
  canvas { width: 300px; height: 480px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.25); }
</style>
</head>
<body>
<canvas id="streak"></canvas>
<canvas id="today"></canvas>
<canvas id="longquote"></canvas>
<script>
  var module = { exports: {} };
</script>
<script src="../pages/checkin/share-poster.js"></script>
<script>
  const poster = module.exports;

  function shim(canvas) {
    canvas.createImage = () => new Image();
    return canvas;
  }

  const base = {
    date: new Date(2026, 5, 12),
    quote: poster.getDailyQuote(new Date(2026, 5, 12)),
    nickName: '小宝0748',
    avatarSrc: '/images/home/mascot-report-jelly.png',
    logoSrc: '/images/app-logo.png',
    continuousDays: 34,
    totalDays: 43,
    todayDone: 2,
    dpr: 2
  };

  Promise.all([
    poster.drawPoster(shim(document.getElementById('streak')), Object.assign({ mode: 'streak' }, base)),
    poster.drawPoster(shim(document.getElementById('today')), Object.assign({ mode: 'today' }, base)),
    poster.drawPoster(shim(document.getElementById('longquote')), Object.assign({}, base, {
      mode: 'today',
      theme: 'pk',
      quote: { en: 'A journey of a thousand miles begins with a single step.', cn: '千里之行，始于足下。' }
    }))
  ]).then(() => { document.title = 'poster-ready'; });
</script>
</body>
</html>
