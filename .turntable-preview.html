<!doctype html>
<meta charset="utf-8">
<style>
  /* 1px = 1rpx，卡片 620 基准 */
  body { margin:0; background:linear-gradient(180deg,#eaf4ff 0%,#eef6ff 32%,#dcecff 52%,#b8d8fb 74%,#86b9ee 100%); min-height:100vh; font-family:-apple-system; }
  .row { display:flex; gap:24px; padding:90px 24px 24px; align-items:flex-start; }
  .player-card {
    position:relative; width:620px; height:620px;
    background:#fff; border-radius:56px;
    box-shadow:0 18px 40px rgba(96,114,140,0.16), 0 4px 12px rgba(96,114,140,0.08);
  }
  /* 轴座底圆（QQ 卡片右上角浅色圆形凸台） */
  .pivot-housing {
    position:absolute; width:150px; height:150px; border-radius:50%;
    left:494px; top:-35px;
    background:radial-gradient(circle at 42% 38%, #fdfdfe 0%, #f4f5f8 58%, #eceef2 100%);
    box-shadow:0 4px 10px rgba(96,114,140,0.08);
  }
  .turntable {
    position:absolute; left:70px; top:70px; width:480px; height:480px;
  }
  /* 托盘：内容圆 55.8% → 想要 500 的圆就放 896 居中 */
  .disc-tray {
    position:absolute; width:896px; height:896px;
    left:-208px; top:-208px; pointer-events:none;
  }
  .disc-stack { position:absolute; inset:0; border-radius:50%; overflow:hidden; }
  /* 白胶碟：纹理内容圆 61% → 显示 480 需要 787 */
  .disc-texture {
    position:absolute; width:787px; height:787px; left:-153px; top:-153px;
  }
  .cover-disc {
    position:absolute; left:50%; top:50%; width:48%; height:48%;
    transform:translate(-50%,-50%); border-radius:50%; object-fit:cover;
    box-shadow:0 0 0 3px rgba(150,170,195,0.4);
  }
  .disc-sheen {
    position:absolute; inset:0; border-radius:50%;
    background:
      radial-gradient(ellipse 78% 52% at 34% 26%, rgba(255,255,255,.36) 0%, rgba(255,255,255,0) 68%),
      radial-gradient(ellipse 62% 44% at 72% 62%, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 64%);
    mix-blend-mode:soft-light;
  }
  .spinning { animation:spin 16s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  /* 唱臂：parked 图为落盘姿态，停放时顺时针抬起 */
  .tonearm {
    position:absolute; width:216px; height:565px;
    left:402px; top:-71px;
    transform-origin:167.4px 111.5px;
    transform:rotate(-14deg);
    transition:transform .9s cubic-bezier(.34,.1,.27,1);
    pointer-events:none;
    filter:drop-shadow(0 10px 14px rgba(96,114,140,0.25));
  }
  .tonearm.on-disc { transform:rotate(4deg); }
  label { display:block; margin:6px 0; font-size:13px; }
  .panel { background:rgba(255,255,255,.85); padding:14px 18px; border-radius:12px; z-index:10; position:relative; }
</style>
<div class="row">
  <div class="player-card">
    <div class="pivot-housing"></div>
    <div class="turntable">
      <img class="disc-tray" src="/images/listen/disc-tray.png">
      <div class="disc-stack spinning">
        <img class="disc-texture" src="/images/listen/disc-texture-overlay.png">
        <img class="cover-disc" src="/images/home/book-cover.png">
        <div class="disc-sheen"></div>
      </div>
    </div>
    <div id="arm" class="tonearm on-disc"><img src="/images/listen/tonearm-arm.png" style="width:100%;height:100%;display:block"><div id="pivotdot" style="position:absolute;left:167.4px;top:111.5px;width:6px;height:6px;margin:-3px;border-radius:50%;background:red"></div></div>
  </div>
  <div class="panel">
    <label><input type="checkbox" id="play" checked> playing(落盘)</label>
    <label>park-rot <input type="range" id="rot" min="0" max="40" value="14" step="0.5"> <span id="rotv"></span></label>
    <label>origin-x% <input type="range" id="ox" min="70" max="100" value="84.9" step="0.2"> <span id="oxv"></span></label>
    <label>origin-y% <input type="range" id="oy" min="5" max="40" value="20.3" step="0.2"> <span id="oyv"></span></label>
    <label>left <input type="range" id="left" min="200" max="500" value="396"> <span id="leftv"></span></label>
    <label>top <input type="range" id="top" min="-160" max="40" value="-73"> <span id="topv"></span></label>
    <label>arm size <input type="range" id="size" min="420" max="700" value="565"> <span id="sizev"></span></label>
    <label>cover% <input type="range" id="cov" min="38" max="64" value="48"> <span id="covv"></span></label>
  </div>
</div>
<script>
  const arm = document.getElementById('arm');
  const apply = () => {
    const v = id => document.getElementById(id).value;
    arm.style.transformOrigin = `${v('ox')}% ${v('oy')}%`;
    arm.style.left = v('left') + 'px';
    arm.style.top = v('top') + 'px';
    arm.style.width = (v('size')*216/565) + 'px'; arm.style.height = v('size') + 'px';
    arm.style.transform = document.getElementById('play').checked ? 'rotate(4deg)' : `rotate(-${v('rot')}deg)`;
    const c = document.querySelector('.cover-disc');
    c.style.width = c.style.height = v('cov') + '%';
    for (const id of ['rot','ox','oy','left','top','size','cov'])
      document.getElementById(id + 'v').textContent = v(id);
  };
  document.querySelectorAll('input').forEach(i => i.addEventListener('input', apply));
  apply();
</script>
